services:
  postgres:
    image: postgres:16-alpine
    container_name: eirmed-postgres
    environment:
      POSTGRES_DB: eirmed
      POSTGRES_USER: eirmed
      POSTGRES_PASSWORD: eirmed_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eirmed"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
